name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    name: Implementation quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run the canonical full gate
        run: ./scripts/check.sh full

  boundary:
    name: Security and public boundary gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run boundary gates
        run: |
          ./scripts/check.sh security
          ./scripts/check.sh public

  artifact:
    name: Native artifact journey (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            extension: tar.gz
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            extension: tar.gz
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            extension: tar.gz
          - runner: macos-15
            goos: darwin
            goarch: arm64
            extension: tar.gz
          - runner: windows-2025
            goos: windows
            goarch: amd64
            extension: zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Package and replay the native artifact
        shell: bash
        run: |
          tag=v0.0.0
          revision="${GITHUB_SHA}"
          binary=$(go run ./tools/projectmeta --field binary_name)
          bash scripts/package-release.sh \
            "${tag}" \
            "${revision}" \
            "${{ matrix.goos }}" \
            "${{ matrix.goarch }}" \
            dist
          archive="dist/${binary}_${tag}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.extension }}"
          mkdir -p evidence
          bash scripts/test-release-artifact.sh \
            "${tag}" \
            "${revision}" \
            "${{ matrix.goos }}" \
            "${{ matrix.goarch }}" \
            "${archive}" \
            >"evidence/${{ matrix.goos }}_${{ matrix.goarch }}.json"

      - name: Upload native journey evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-journey-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            evidence/${{ matrix.goos }}_${{ matrix.goarch }}.json
            dist/*
          if-no-files-found: error
          overwrite: true

  artifact-conformance:
    name: Verify five-target native artifact evidence
    needs: artifact
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download native journey evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: native-journey-*
          path: native-inputs
          merge-multiple: true

      - name: Verify exact native evidence set
        shell: bash
        run: |
          go run ./tools/artifactevidence \
            --directory "${GITHUB_WORKSPACE}/native-inputs/evidence" \
            --archives "${GITHUB_WORKSPACE}/native-inputs/dist" \
            --tag v0.0.0 \
            --revision "${GITHUB_SHA}" \
            >native-evidence-summary.json

      - name: Upload bounded native evidence summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-aggregate
          path: native-evidence-summary.json
          if-no-files-found: error
          overwrite: true
