schema_version: 1
command:
  executable: gh
  args_prefix: [pr, list]
decision: allow
reason: Return only pull request identity and status.
invoke:
  append_args: ["--json=number,title,state"]
output:
  input: json
  select: [number, title, state]
  rename:
    - from: number
      to: id
  render: compact_json
